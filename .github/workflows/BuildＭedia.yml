name: Build & Release AAR

# ======================= 【可修改变量】 =======================
env:
  REPO_URL: FongMi/media  # 仓库地址
  TARGET_BRANCH: release-1.10.0-fongmi                         # 要编译的分支
  AAR_PATH: media/build/outputs/aar/media-release.aar  # AAR 路径
# ==============================================================

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO_URL }}
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Release AAR
        run: ./gradlew assembleRelease

      # 关键：自动收集 media/libraries 下 任意层级 的所有 *release.aar
      - name: Collect all release AAR files
        run: |
          mkdir -p release_aars
          find ./libraries -name "*release.aar" -type f -exec cp {} release_aars/ \;

      - name: Create Release and Upload ALL AAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Release AAR ${{ github.run_number }}
          files: release_aars/*.aar
